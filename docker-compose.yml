# Marketing Commander local development stack (plan/plan.md Phase 3).
# Increment 3.1 delivers infrastructure services (PostgreSQL, Redis);
# application stubs (api, worker, web) arrive in Increments 3.2-3.4.
#
# Phase 3 health contract: every service here declares a healthcheck;
# scripts/bootstrap_check.py fails any service without a healthy state.
# Image pins are recorded under decision D3-1 in plan/plan.md.
#
# Start: docker compose up --build   (or: make run)

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketing_commander}
      POSTGRES_USER: ${POSTGRES_USER:-mc_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      # postgres:18 images mount /var/lib/postgresql (not .../data).
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-mc_app} -d $${POSTGRES_DB:-marketing_commander}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - marketing-commander

  api:
    build: apps/api
    environment:
      MC_ENV: ${MC_ENV:-local}
      # D5-2 CORS: the browser origin serving the web app.
      WEB_ORIGIN: http://localhost:${WEB_PORT:-3000}
      # In-network addresses; the .env values are the host's view.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-marketing_commander}
      POSTGRES_USER: ${POSTGRES_USER:-mc_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      # Bind-mount source only; installed dependencies stay in the image.
      # uvicorn --reload picks up edits without a rebuild.
      - ./apps/api/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - marketing-commander

  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - marketing-commander

  web:
    build: apps/web
    environment:
      # D5-2: the browser fetches the API directly on its published
      # localhost port.
      NEXT_PUBLIC_API_BASE: http://localhost:${API_PORT:-8000}
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    volumes:
      # Bind-mount source for next dev hot reload; keep the image's
      # node_modules via an anonymous volume.
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/healthz').then(r => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - marketing-commander

  worker:
    build: services/worker
    environment:
      MC_ENV: ${MC_ENV:-local}
      # In-network address; the .env REDIS_URL is the host's view.
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "worker.health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - marketing-commander

networks:
  marketing-commander:

volumes:
  postgres-data:
