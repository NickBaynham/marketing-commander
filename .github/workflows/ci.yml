name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"
      - name: Install dependencies (same as local "make setup")
        run: make setup
      - name: Prepare environment file
        run: cp .env.example .env
      - name: Start infrastructure services (waits for healthy)
        run: docker compose up -d --wait
      - name: Check (same gate as local "make check")
        run: make check
      - name: Apply database migrations
        run: make migrate
      - name: Seed the local owner (sets the owner credential for sign-in)
        run: make seed
      - name: Install Playwright (Chromium)
        run: cd tests/e2e && npm ci && npx playwright install --with-deps chromium
      - name: End-to-end tests (D5-3 CI scope, chromium desktop and mobile)
        run: make test-e2e-ci
      - name: Service logs on failure
        if: failure()
        run: docker compose ps -a && docker compose logs --tail 50
