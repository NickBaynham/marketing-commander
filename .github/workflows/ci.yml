name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pdm install
      - name: Prepare environment file
        run: cp .env.example .env
      - name: Start infrastructure services (waits for healthy)
        run: docker compose up -d --wait
      - name: Check (same gate as local "make check")
        run: make check
      - name: Service logs on failure
        if: failure()
        run: docker compose ps -a && docker compose logs --tail 50
