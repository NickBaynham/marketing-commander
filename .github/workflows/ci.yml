name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pdm install
      - name: Prepare environment file
        run: cp .env.example .env
      - name: Check (same gate as local "make check")
        run: make check
