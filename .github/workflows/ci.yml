name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pdm install
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Bootstrap check
        run: |
          cp .env.example .env
          make bootstrap-check
